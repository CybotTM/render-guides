# Contract workflow: on every PR that touches packages/typo3-docs-theme/,
# rebuild the assets and fail if the committed output diverges from what
# the build produces.
#
# This is the actual gate — mark it as a required status check in branch
# protection. The companion dependabot-rebuild-assets.yaml is just the
# convenience layer that keeps Dependabot PRs from tripping this check.

name: "Check built assets"

on: # yamllint disable-line rule:truthy
  pull_request:
    paths:
      - "packages/typo3-docs-theme/**"
      - ".github/workflows/check-built-assets.yaml"

permissions:
  contents: read

jobs:
  verify:
    name: "verify"
    runs-on: ubuntu-latest

    steps:
      - name: "Harden runner"
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            registry.npmjs.org:443

      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Install Node"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: "packages/typo3-docs-theme/package.json"
          cache: "npm"
          cache-dependency-path: "packages/typo3-docs-theme/package-lock.json"

      - name: "Install npm dependencies (no install scripts)"
        working-directory: packages/typo3-docs-theme
        run: "npm ci --ignore-scripts"

      - name: "Build assets"
        working-directory: packages/typo3-docs-theme
        run: "npm run build"

      - name: "Fail if generated assets differ from committed output"
        run: |
          ASSET_PATHS=(
            packages/typo3-docs-theme/assets
            packages/typo3-docs-theme/resources/public
          )

          # Two failure modes to detect:
          #   1. Tracked files changed (git diff)
          #   2. New untracked files were generated under the asset trees
          #      (git diff alone would miss these)
          modified="$(git diff --name-only -- "${ASSET_PATHS[@]}")"
          untracked="$(git ls-files --others --exclude-standard -- "${ASSET_PATHS[@]}")"

          if [ -z "$modified" ] && [ -z "$untracked" ]; then
            exit 0
          fi

          echo "Files out of sync with current build:"
          if [ -n "$modified" ]; then
            printf '%s\n' "$modified" | sed 's/^/  modified: /'
          fi
          if [ -n "$untracked" ]; then
            printf '%s\n' "$untracked" | sed 's/^/  untracked: /'
          fi
          echo ""
          echo "::error::Generated assets are out of date. Reproduce locally with:"
          echo "::error::  cd packages/typo3-docs-theme && npm ci && npm run build"
          echo "::error::Then 'git add assets resources/public && git commit'."
          echo "::error::See Documentation/Developer/ThemeCustomization.rst for context."
          exit 1
