# Convenience workflow: on a Dependabot PR that bumps an npm dependency under
# packages/typo3-docs-theme/, rebuild the committed assets and push them back
# to the Dependabot branch.
#
# This is NOT the contract — check-built-assets.yaml is. If this workflow
# fails (transient build error, token scope, allowlist drift), the check
# workflow still catches the resulting stale assets and blocks the PR.
#
# Trigger: pull_request_target matches the local convention in
# .github/workflows/pr-auto-merge.yaml ("due to permission issues with the
# pull_request target"). Defense-in-depth on the pull_request_target form:
#
#   - if: github.actor == 'dependabot[bot]' actor gate
#   - PR head pinned by SHA (not ref) — defeats TOCTOU between trigger
#     and checkout if Dependabot force-pushes mid-flight
#   - lockfile-only diff guard — refuses to build if the PR changed any
#     file other than package.json / package-lock.json
#   - npm ci --ignore-scripts — install lifecycle scripts cannot run
#   - persist-credentials: false — no token is left in .git/config after
#     checkout, so the build step (vite/grunt config + npm deps) cannot read
#     a credential off disk
#   - the rebuilt files are committed via the GitHub API
#     (createCommitOnBranch) using a short-lived GitHub App token, never via
#     `git push`. API commits are signed server-side by GitHub (Verified),
#     and an App-token commit still re-triggers verify/Tests on the new SHA.
#   - block-mode harden-runner egress policy (added in the next commit)

name: "Rebuild assets for Dependabot"

on: # yamllint disable-line rule:truthy
  pull_request_target:
    paths:
      - "packages/typo3-docs-theme/package.json"
      - "packages/typo3-docs-theme/package-lock.json"

permissions:
  contents: write

jobs:
  build-and-commit:
    name: "build-and-commit"
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: "Harden runner"
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            registry.npmjs.org:443

      # Mint a short-lived (1h) installation token from the GitHub App.
      # Unlike GITHUB_TOKEN, a push authenticated as the App DOES re-trigger
      # workflows — so the rebuild commit gets its own run of verify/Tests
      # (closing the "checks only run on the original commit" gap). The App
      # private key never touches the build step; this only mints the token.
      # JWT mode (private-key) talks to api.github.com only — already in the
      # harden-runner allowlist above.
      - name: "Mint App token"
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: "Checkout Dependabot branch"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          persist-credentials: false
          fetch-depth: 0

      - name: "Verify PR diff is lockfile-only"
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # A legitimate Dependabot npm PR only touches package.json and
          # package-lock.json. Anything else means the branch was tampered
          # with — fail closed before we execute vite/grunt config.
          ALLOWED=(
            packages/typo3-docs-theme/package.json
            packages/typo3-docs-theme/package-lock.json
          )

          changed="$(git diff --name-only "$BASE_SHA"...HEAD)"
          unexpected=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            match=0
            for a in "${ALLOWED[@]}"; do
              [ "$f" = "$a" ] && match=1 && break
            done
            [ $match -eq 0 ] && unexpected="${unexpected}${f}"$'\n'
          done <<< "$changed"

          if [ -n "$unexpected" ]; then
            echo "::error::Dependabot PR touches files outside the npm lockfile set. Refusing to build."
            printf '%s' "$unexpected"
            exit 1
          fi

      - name: "Install Node"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: "packages/typo3-docs-theme/package.json"
          cache: "npm"
          cache-dependency-path: "packages/typo3-docs-theme/package-lock.json"

      - name: "Install npm dependencies (no install scripts)"
        working-directory: packages/typo3-docs-theme
        run: "npm ci --ignore-scripts"

      - name: "Build assets"
        working-directory: packages/typo3-docs-theme
        run: "npm run build"

      # Inspect the asset trees in shell (git output stays in shell, never
      # interpolated into JS): reject unexpected new files, record the
      # changed-file status to a temp file, and expose the current head SHA.
      - name: "Prepare verified commit inputs"
        id: prepare
        run: |
          ASSET_PATHS=(
            packages/typo3-docs-theme/assets
            packages/typo3-docs-theme/resources/public
          )

          untracked="$(git ls-files --others --exclude-standard -- "${ASSET_PATHS[@]}")"
          if [ -n "$untracked" ]; then
            echo "::error::Build produced unexpected untracked files in the asset trees. Refusing to commit."
            printf '%s\n' "$untracked"
            exit 1
          fi

          git diff --name-status -- "${ASSET_PATHS[@]}" > "$RUNNER_TEMP/asset-changes.tsv"
          echo "head_oid=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Commit rebuilt files via the GitHub API (createCommitOnBranch) rather
      # than `git commit`/`git push`. A commit created through the API is
      # signed server-side by GitHub, so it shows as "Verified" — a plain git
      # push over HTTPS cannot be signed without a key on the runner. Because
      # it is created with the App token (not GITHUB_TOKEN) the push still
      # re-triggers verify/Tests on the new commit. The commit is authored by
      # the App, not dependabot[bot]: GitHub only signs commits it attributes
      # to the token holder.
      - name: "Commit rebuilt assets as a verified commit (if changed)"
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9.0.0
        env:
          EXPECTED_HEAD_OID: ${{ steps.prepare.outputs.head_oid }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');

            const nameStatus = fs
              .readFileSync(`${process.env.RUNNER_TEMP}/asset-changes.tsv`, 'utf8')
              .trim();

            if (!nameStatus) {
              core.info('No generated asset changes.');
              return;
            }

            const additions = [];
            const deletions = [];
            for (const line of nameStatus.split('\n')) {
              const parts = line.split('\t');
              const status = parts[0];
              const path = parts[parts.length - 1];
              if (status.startsWith('D')) {
                deletions.push({ path });
              } else {
                additions.push({
                  path,
                  contents: fs.readFileSync(path).toString('base64'),
                });
              }
            }

            const fileChanges = { additions };
            if (deletions.length) fileChanges.deletions = deletions;

            const result = await github.graphql(
              `mutation($input: CreateCommitOnBranchInput!) {
                 createCommitOnBranch(input: $input) { commit { oid url } }
               }`,
              {
                input: {
                  branch: {
                    repositoryNameWithOwner: context.payload.repository.full_name,
                    branchName: context.payload.pull_request.head.ref,
                  },
                  expectedHeadOid: process.env.EXPECTED_HEAD_OID,
                  message: { headline: '[TASK] Rebuild theme assets after dependency update' },
                  fileChanges,
                },
              }
            );

            const commit = result.createCommitOnBranch.commit;
            core.info(`Created verified rebuild commit ${commit.oid}`);
            core.info(commit.url);

      # Auto-merge is enabled HERE — after the rebuild commit (if any) is on
      # the branch — instead of in pr-auto-merge.yaml. That workflow fires at
      # PR-open time and would squash-merge before this rebuild completes,
      # leaving stale assets on the target branch (the race that this branch
      # excludes theme PRs from). Gating the merge on this workflow's progress
      # is the point: a broken build, the lockfile-only guard, or the
      # untracked-file guard each fail an earlier step and never reach this,
      # so a bad upgrade stays open for manual review.
      #
      # A previous step's `exit 0` (the "no generated asset changes" path)
      # only ends that step's script, not the job — so these steps still run
      # whether or not a rebuild commit was pushed.
      - name: "Dependabot metadata"
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Enable auto-merge for patch/minor updates"
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge --squash --auto "${{ github.event.pull_request.number }}" -R "${{ github.repository }}"
